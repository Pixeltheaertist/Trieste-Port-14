- type: entity
  abstract: true
  parent: BasePDA
  id: TP14BaseTriestePDA
  name: PDA
  description: Personal Data Assistant.
  components:
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda
  - type: Sprite
    sprite: _TP/Objects/Devices/pda.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
  - type: Icon
    sprite: _TP/Objects/Devices/pda.rsi
    state: pda

- type: entity
  parent: TP14BaseTriestePDA
  id: TP14OverseerPDA
  name: overseer PDA # TP
  description: Surprisingly no different from your PDA.
  components:
  - type: Pda
    id: CaptainIDCard
    penSlot:
      startingItem: PenCap
      priority: -1
      whitelist:
        tags:
        - Write
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-overseer
  - type: PdaBorderColor
    borderColor: "#3a665a"
  - type: Icon
    state: pda-overseer
  - type: Item
    size: Small
    heldPrefix: overseer





- type: entity
  parent: BasePDA
  id: TP14PilotPDA
  suffix: Trieste, PDA, Expeditionary
  name: pilot PDA
  description: Protocol III, protect the PDA.
  components:
  - type: Pda
    id: TP14PilotIDCard
  - type: PdaBorderColor
    borderColor: "#af9366"
    accentVColor: "#8900c9"
  - type: Icon
    state: pda-miner
  - type: CartridgeLoader
    uiKey: enum.PdaUiKey.Key
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NanoTaskCartridge
    - NewsReaderCartridge
    - AstroNavCartridge

- type: entity
  parent: BasePDA
  id: TP14BasinTechPDA
  suffix: Trieste, PDA, Expeditionary
  name: basin technician PDA
  description: It's completely waterlogged.
  components:
  - type: Pda
    id: TP14BasinTechIDCard
  - type: PdaBorderColor
    borderColor: "#af9366"
    accentVColor: "#8900c9"
  - type: Icon
    state: pda-miner
  - type: CartridgeLoader
    uiKey: enum.PdaUiKey.Key
    preinstalled:
    - CrewManifestCartridge
    - NotekeeperCartridge
    - NanoTaskCartridge
    - NewsReaderCartridge
    - AstroNavCartridge
