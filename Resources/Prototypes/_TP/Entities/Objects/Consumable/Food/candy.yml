
# Vanilla
- type: entity
  parent: FoodSnackBase
  id: TP14FoodSnackSaltwaterTaffy
  suffix: Trieste, Food
  name: vanilla saltwater taffy
  description: A piece of vanilla saltwater taffy, this is about as basic as you can get
  components:
  - type: FlavorProfile
    flavors:
    - sweet
    - vanilla
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Sugar
          Quantity: 5
  - type: Sprite
    sprite: _TP/Objects/Consumable/Snacks/Candy/taffy.rsi
    layers:
    - state: taffy_wrapper
    - state: taffy_vanilla

