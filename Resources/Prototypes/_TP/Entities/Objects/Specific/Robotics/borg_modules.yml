- type: entity
  id: BorgModuleNanotrasenWeapon
  parent: [ BaseBorgModule, BaseProviderBorgModule, BaseNanotrasenContraband ]
  name: offensive cyborg module
  suffix: Trieste, NanoTraitor
  components:
  - type: Sprite
    layers:
    - state: service
  - type: ItemBorgModule
    hands:
    - item: TP14WeaponNtBlaster

# Cargo
- type: entity
  id: BaseBorgModuleTriesteCargo
  parent: BaseBorgModule
  abstract: true
  components:
  - type: BorgModule
    borgFitTypes:
    - tp-borg-type-cargo
  - type: Tag
    tags:
    - BorgModuleCargo
  - type: Item
    inhandVisuals:
      left:
      - state: base-icon-inhand-left
        color: "#EBD8B7"
      - state: base-module-inhand-left
        color: "#613D1D"
      - state: base-stripes-inhand-left
        color: "#593718"
      right:
      - state: base-icon-inhand-right
        color: "#EBD8B7"
      - state: base-module-inhand-right
        color: "#613D1D"
      - state: base-stripes-inhand-right
        color: "#593718"

- type: entity
  parent: MailBag
  id: TP14IntegratedMailBag
  categories: [ HideSpawnMenu ]
  components:
  - type: Unremoveable

- type: entity
  parent: [ BaseBorgModuleTriesteCargo, BaseProviderBorgModule ]
  id: TP14BorgModuleMail
  name: mail delivery cyborg module
  components:
  - type: Sprite
    layers:
    - state: cargo
    - state: icon-mail
  - type: ItemBorgModule
    hands:
    - item: TP14IntegratedMailBag
    - hand:
        emptyRepresentative: PackageDelivery
        emptyLabel: tp14-borg-slot-package-empty
        whitelist:
          components:
          - Delivery
          - MultiHandedItem
        blacklist:
          components:
          - Paper
          - CargoBountyLabel
          tags:
          - Paper
    - hand:
        emptyRepresentative: PackageDelivery
        emptyLabel: tp14-borg-slot-package-empty
        whitelist:
          components:
          - Delivery
          - MultiHandedItem
        blacklist:
          components:
          - Paper
          tags:
          - Paper
    - hand:
        emptyRepresentative: PaperCargoBountyManifest
        emptyLabel: tp14-borg-slot-bounty-empty
        whitelist:
          components:
          - CargoBountyLabel
        blacklist:
          components:
          - MultiHandedItem
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: mail-module }
