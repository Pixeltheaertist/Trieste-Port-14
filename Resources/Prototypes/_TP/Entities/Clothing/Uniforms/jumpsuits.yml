#command
- type: entity
  parent: [ClothingUniformBase, BaseCommandContraband]
  id: TP14ClothingUniformJumpsuitOverseer
  suffix: Trieste, Uniform, Command
  name: overseer's jumpsuit
  description: It's a seafoam polo with some gold markings denoting rank.
  components:
  - type: Sprite
    sprite: _TP/Clothing/Uniforms/Jumpsuit/overseer.rsi
  - type: Clothing
    sprite: _TP/Clothing/Uniforms/Jumpsuit/overseer.rsi

- type: entity
  parent: [ClothingUniformBase, BaseCommandContraband]
  id: TP14ClothingUniformFormalJumpsuitOverseer
  suffix: Trieste, Uniform, Command
  name: overseer's formal suit
  description: It's a dark seafoam suit, it looks sharp and portrays a calming sense of order.
  components:
  - type: Sprite
    sprite: _TP/Clothing/Uniforms/Jumpsuit/overseerformal.rsi
  - type: Clothing
    sprite: _TP/Clothing/Uniforms/Jumpsuit/overseerformal.rsi

- type: entity
  parent: [ClothingUniformBase, BaseCommandContraband]
  id: TP14ClothingUniformHighVisJumpsuitOverseer
  suffix: Trieste, Uniform, Command
  name: overseer's high vis jumpsuit
  description: a seafoam jumpsuit with retroreflective stripes to keep the wearer safe on the rig.
  components:
  - type: Sprite
    sprite: _TP/Clothing/Uniforms/Jumpsuit/overseerhighvis.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
    - state: icon-unshaded
      shader: shaded
  - type: Clothing
    sprite: _TP/Clothing/Uniforms/Jumpsuit/overseerhighvis.rsi
    clothingVisuals:
      jumpsuit:
      - state: equipped-INNERCLOTHING
      - state: equipped-INNERCLOTHING-unshaded
        shader: unshaded
      - state: equipped-INNERCLOTHING-unshaded
        shader: shaded

