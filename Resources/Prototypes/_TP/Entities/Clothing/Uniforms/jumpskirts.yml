#Command
- type: entity
  parent: [ClothingUniformSkirtBase, BaseCommandContraband]
  id: TP14ClothingUniformJumpskirtOverseer
  suffix: Trieste, Uniform, Command
  name: overseer's jumpskirt
  description: It's a seafoam polo and skirt with some gold markings denoting rank.
  components:
  - type: Sprite
    sprite: _TP/Clothing/Uniforms/Jumpskirt/overseer.rsi
  - type: Clothing
    sprite: _TP/Clothing/Uniforms/Jumpskirt/overseer.rsi

- type: entity
  parent: [ClothingUniformBase, BaseCommandContraband]
  id: TP14ClothingUniformFormalJumpskirtOverseer
  suffix: Trieste, Uniform, Command
  name: overseer's formal Dress
  description: It's dark, warm seafoam dress, it exudes calm authority.
  components:
  - type: Sprite
    sprite: _TP/Clothing/Uniforms/Jumpskirt/overseerformal.rsi
  - type: Clothing
    sprite: _TP/Clothing/Uniforms/Jumpskirt/overseerformal.rsi

- type: entity
  parent: [ClothingUniformBase, BaseCommandContraband]
  id: TP14ClothingUniformHighVisJumpskirtOverseer
  suffix: Trieste, Uniform, Command
  name: overseer's high vis jumpskirt
  description: a seafoam jumpskirt with retroreflective stripes to keep the wearer safe on the rig.
  components:
  - type: Sprite
    sprite: _TP/Clothing/Uniforms/Jumpskirt/overseerhighvis.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
    - state: icon-unshaded
      shader: shaded
  - type: Clothing
    sprite: _TP/Clothing/Uniforms/Jumpskirt/overseerhighvis.rsi
    clothingVisuals:
      jumpsuit:
      - state: equipped-INNERCLOTHING
      - state: equipped-INNERCLOTHING-unshaded
        shader: unshaded
      - state: equipped-INNERCLOTHING-unshaded
        shader: shaded


