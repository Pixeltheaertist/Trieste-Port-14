#clown and mime

- type: entity
  parent: ClothingHeadBase
  id: TP14ClothingHeadHatWearyClownHat
  suffix: Trieste, Headwear, Clown
  name: old tophat
  description: A ratty, old, faded tophat.
  components:
  - type: Sprite
    sprite: _TP/Clothing/Head/Hats/weary_hat.rsi
  - type: Clothing
    sprite: _TP/Clothing/Head/Hats/weary_hat.rsi
    clothingVisuals:
      head:
      - state: equipped-HELMET
        offset: "0, 0.06"
  - type: Item
    size: Normal
  - type: Storage
    grid:
    - 0,0,1,1
    quickInsert: false
    maxItemSize: Small
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: Tag
    tags:
    - PetWearable
    - CorgiWearable
    - ClothMade
    - Recyclable
    - HamsterWearable
    - WhitelistChameleon


