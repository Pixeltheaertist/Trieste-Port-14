#white
- type: entity
  parent: ClothingHeadBase
  id: TP14ClothingHeadBeanie
  suffix: Trieste, Headwear
  name: white beanie
  description: A generic white beanie, keeps your head warm and cozy
  components:
  - type: Sprite
    sprite: Clothing/Head/Hats/beanie.rsi
    layers:
    - state: cuffcrown-icon
    - state: body-icon
  - type: Item
    inhandVisuals:
      left:
      - state: cuffcrown-inhand-left
      - state: body-inhand-left
      right:
      - state: cuffcrown-inhand-right
      - state: body-inhand-right
  - type: Clothing
    sprite: Clothing/Head/Hats/beanie.rsi
    clothingVisuals:
      head:
      - state: cuffcrown-equipped-HELMET
      - state: body-equipped-HELMET
  - type: Tag
    tags:
    - PetWearable
    - CorgiWearable
    - ClothMade
    - Recyclable

