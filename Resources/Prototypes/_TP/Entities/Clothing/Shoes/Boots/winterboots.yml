- type: entity
  parent: ClothingShoesBaseWinterBoots
  id: EntClothesBlackWinterBoots
  name: black winter boots
  suffix: Trieste, Footwear
  components:
  - type: Sprite
    sprite: _TP/Clothing/Shoes/Boots/colorable-winterboots.rsi
    layers:
    - state: icon
      color: "#3f3f3f"
    - state: soles-icon
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#3f3f3f"
      - state: soles-inhand-left
      right:
      - state: inhand-right
        color: "#3f3f3f"
      - state: soles-inhand-right
  - type: Clothing
    sprite: Clothing/Shoes/Boots/Boots/winterboots.rsi
    clothingVisuals:
      shoes:
      - state: equipped-FEET
        color: "#1d1d1d"
      - state: soles-equipped-FEET

