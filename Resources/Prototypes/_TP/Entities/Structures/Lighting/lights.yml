# Seafloor light post
- type: entity
  id: TP14MarineLightPost
  name: marine standing lamp
  description: "An standing light capable of handling the high pressure of the ocean floor."
  suffix: Trieste, Always Powered, Waterproof, Marine
  parent: BaseStructure
  components:
  - type: Sprite
    sprite: _TP/Structures/Lighting/marine-light-post.rsi
    snapCardinals: true
    drawdepth: Objects
    noRot: true
    layers:
    - map: ["enum.PoweredLightLayers.Base"]
      state: base
    - map: ["enum.PoweredLightLayers.Glow"]
      state: glow
      shader: unshaded
    state: base
  - type: PointLight
    radius: 5
    energy: 0.8
    softness: 3
    color: "#76a0b0"
  - type: Anchorable
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "0.17,0.25,-0.17,-0.30"
        density: 190
        mask:
        - MachineMask
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 4
      - !type:EmptyAllContainersBehaviour
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  - type: StaticPrice
    price: 75
  - type: RequireProjectileTarget
  - type: InGas
    gasID: 9
    damagedByGas: false # waterproof
    gasThreshold: 75
    damage:
      types:
        Blunt: 3

# Sweetwater lighting

- type: entity  # Bulb for the external lights
  parent: BaseLightbulb
  name: high-pressure light bulb
  id: TP14MarineLightBulb
  suffix: Trieste, Marine
  description: An efficient, sturdy bulb for deep water light fixtures. Why did this come with algae on it?
  components:
    - type: LightBulb
      bulb: Bulb
      color: "#76a0b0"
      lightEnergy: 1
      lightRadius: 8
      lightSoftness: 3
      BurningTemperature: 350
      PowerUse: 5
    - type: Tag
      tags:
      - LightBulb 
      - Trash 

- type: entity  # Sweetwater External Lights
  id: TP14PoweredMarineSmallLight
  suffix: Marine, Waterproof, Trieste
  parent: PoweredSmallLightEmpty
  components:
  - type: Sprite
    state: base
  - type: PointLight
    enabled: true
    radius: 8
    energy: 1
    softness: 3
    color: "#76a0b0"
  - type: PoweredLight
    hasLampOnSpawn: TP14MarineLightBulb
  - type: DamageOnInteract
    damage:
      types:
        Heat: 1
    popupText: powered-light-component-burn-hand
  - type: InGas
    gasID: 9
    damagedByGas: false # waterproof
    gasThreshold: 75
    damage:
      types:
        Blunt: 3

