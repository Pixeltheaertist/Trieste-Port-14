- type: entity
  parent: BaseStructure
  id: BaseCliff
  abstract: true
  name: cliff
  description: A cliff-face. Watch your step!
  components:
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _TP/Structures/Walls/cliffs.rsi
  - type: Icon
    sprite: _TP/Structures/Walls/cliffs.rsi
  - type: Physics
    bodyType: Static
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Climbable
  - type: RCDDeconstructable
    cost: 4
    delay: 2
    fx: EffectRCDDeconstruct2

- type: entity
  parent: BaseCliff
  id: SandCliff
  suffix: Sand, Trieste
  components:
  - type: Sprite
    state: sand_side
  - type: Icon
    state: sand_side
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.25"
        density: 1000
        mask:
        - TableMask
        layer:
        #- MidImpassable
        - LowImpassable
  - type: InteractionOutline
  - type: Repairable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: SandCliff
  id: BasaltCliff
  suffix: Basalt, Trieste
  components:
  - type: Sprite
    state: basalt_side
  - type: Icon
    state: basalt_side

