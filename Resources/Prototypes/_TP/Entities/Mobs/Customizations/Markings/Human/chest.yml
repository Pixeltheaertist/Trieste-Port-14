#Harpy

- type: marking
  id: TP14MarkingsHumanChestHarpy
  bodyPart: UndergarmentTop
  markingCategory: Chest
  speciesRestriction: [ Human ]
  coloring:
    default:
      type:
        !type:CategoryColoring
        category: Hair
      fallbackTypes:
      - !type:CategoryColoring
        category: FacialHair
      - !type:SkinColoring
  sprites:
  - sprite: _TP/Mobs/Customization/Markings/Humans/chest.rsi
    state: harpy_torso_primary
  - sprite: _TP/Mobs/Customization/Markings/Humans/chest.rsi
    state: harpy_torso_secondary

