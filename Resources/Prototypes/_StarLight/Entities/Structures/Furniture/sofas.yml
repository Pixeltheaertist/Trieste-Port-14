- type: entity
  name: diner booth end left
  id: DinerEndLeft
  parent: SeatBase
  description: It looks like cheap plastic, and smells like fries.
  components:
  - type: Transform
    anchored: true
  - type: Rotatable
  - type: Sprite
    sprite: _Starlight/Structures/Furniture/Sofas/diner_end_left.rsi
