  - uid: 690
    components:
    - type: MetaData
      desc: 'An old book. The back says: "Property of the LGH"'
      name: Hitchhiker's Guide to the Frontier
    - type: Transform
      pos: 41.40162,39.806255
      parent: 2
    - type: Paper
      content: >+
        [color=#aaaaaa]▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀[/color]

        [head=1]The Hitchhiker's Guide to the Frontier Vol 1[/head] [bold]

        [/bold]

        [color=#aaaaaa]▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬[/color]

        [head=3]Chapter One: "Standard Gear"[/head]

        [italic]Tools of the Trade[/italic]

        ---------------------------------------------------------------------------

        [color=#cb9324][italic]This is basic suggested gear for Hitchhiking. However. each Hiker will develop their own unique loadout as they learn and personalize their gear [/color] [/italic]

        [color=#1b67a5]▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬[/color]
             Basic Hitchhiking gear includes:
        -1 grappling hook (for latching onto ships and movement in microgravity)


        -1 space suit of any kind


        -At least 2 filled oxygen tanks, 3 preferable


        -Water storage, such as a jug


        -A sharp tool, such as a survival knife


        -Leather gloves to prevent light burns


        -Pilot goggles/GPS for transmitting coordinates in case of emergency


        -A medical tracking implant to be recovered in disaster

            OPTIONAL:*

        -A handheld mass scanner for ship IDing and navigation


        -Spare medium batteries for the mass scanner


        -A drill for mining ore or planet cliffs


        -A toolbelt for dissasembling wrecks and planetary outposts

        ────────────────────────────────────

        [italic]*Footnote 1: I really like bringing an instrument when i'm bored, and other games too! [/italic]

        [color=#1b67a5]▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬[/color]

        [head=3]Chapter Two: "The First Hike"[/head]

        [italic]Embarking on a Hitchhike[/italic]


        Your first hike will most likely be something simple and safe, to get a feel for hitchhiking. Now, there are two main forms of Hitchhiking: [italic]Opener [/italic]and [italic]Stowaway [/italic]

        ──────────────────────────────────

        [italic]Openers[/italic] are hikers who ask a crew to transport them from place to place, and generally are social and may even assist crews with their jobs during the flight.

        ~~~~~~~~~~~~~~~~~~~~~~

        [italic]Stowaways,[/italic] on the other hand, are sneaky and mostly just use stealth to get around. Primary forms of stowing away are [italic]grappling[/italic] to the hull of a vessel, hiding on a [italic]lattice[/italic] by a thruster or in a [italic]blind spot[/italic], or sneaking aboard and hiding in a [italic]crate[/italic] or [italic]empty room.[/italic]

        ▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬

        So you're geared up and ready for your first hike. First thing you're going to want to do if find the [italic] mass scanner console[/italic]. This bad boy will tell you all the information you need to find a proper host to hike with.


        For a first hike, it is recommended to ride a easy-to-board or cheap craft, such as a [bold]pioneer[/bold] or a [bold]loader[/bold].


        [color=#ADD8E6]▬▬▬▬▬[/color][color=#808080]▬[/color][color=#Ffff00]▬[/color][color=#1b03a3]█[/color]

        [color=#ADD8E6]█[/color]                         █

        █                         █             [italic]This is a very rudimentary sketch[/italic]

        █                         █              [color=#0][italic]of a pioneer, not to scale.[/italic][/color]

        █                        [color=#A9A9A9] █ [/color]

        █ [/color]                        █

        █                         █

        \▬▬▬[color=#ADD8E6]▬[/color]▬▬ /
         [bold][head=2]^[/bold][/head][color=#1b03a3]         ██[/color]
          [bold]l[/bold]
         [bold] l[/bold]
          [bold]l[/bold]
              [italic]Good spot here![/italic]
        ▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬

        The above graph shows a Pioneer, a vessel generally used for salvage operations or asteroid mining. In the corner of the craft there is a half lattice on the left side of the primary directional thrusters, quietly get to it and secure yourself tightly to the wall with your grappling hook for safety. For the duration of the ride it is suggested to keep your tether attached at all times, only unsecuring it to switch ships or move spots.

        ---------------------------------------------------------------------

        After you feel you've gotten the hang of attaching and detatching silently, it is time to congratulate yourself on a sucessful first hike! Well done, Hiker!




